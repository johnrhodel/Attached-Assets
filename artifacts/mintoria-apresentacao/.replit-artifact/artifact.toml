kind = "slides"
previewPath = "/apresentacao/"
title = "Apresentação Mintoria"
version = "1.0.0"
id = "artifacts/mintoria-apresentacao"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/apresentacao/" ]
localPort = 21664

[services.development]
run = "pnpm --filter @workspace/mintoria-apresentacao run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mintoria-apresentacao", "run", "build" ]
publicDir = "artifacts/mintoria-apresentacao/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21664"
BASE_PATH = "/apresentacao/"
